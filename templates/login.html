<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Attendance Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --teal: #0E7C6B;
      --teal-light: #E6F5F2;
      --teal-mid: #3DA896;
      --surface: #F7F8FA;
      --card: #FFFFFF;
      --border: #E2E6EE;
      --text: #1A1D26;
      --muted: #6B7280;
      --accent: #075C4E;
      --success: #16A349;
      --error: #DC2626;
      --radius: 14px;
      --input-h: 52px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem 3rem;
      color: var(--text);
    }

    .page-wrap {
      width: 100%;
      max-width: 440px;
    }

    /* ORG BADGE */
    .org-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .org-logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .org-logo svg {
      width: 26px;
      height: 26px;
    }

    .org-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--teal);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .org-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* CARD */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(14, 124, 107, 0.06);
    }

    /* CARD HEADER */
    .card-header {
      background: var(--teal);
      padding: 1.75rem 1.75rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .card-header::after {
      content: '';
      position: absolute;
      right: -30px;
      top: -30px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      pointer-events: none;
    }

    .card-header::before {
      content: '';
      position: absolute;
      right: 40px;
      bottom: -50px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      pointer-events: none;
    }

    .form-type-pill {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.9);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 0.75rem;
      position: relative;
      z-index: 1;
    }

    .card-title {
      font-size: 1.35rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
      position: relative;
      z-index: 1;
    }

    .card-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      margin-top: 6px;
      position: relative;
      z-index: 1;
    }

    /* FORM BODY */
    .form-body {
      padding: 1.75rem;
    }

    .field-group {
      margin-bottom: 1.125rem;
    }

    .field-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: 0.02em;
    }

    .field-icon {
      width: 22px;
      height: 22px;
      background: var(--teal-light);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .field-icon svg {
      width: 13px;
      height: 13px;
      fill: var(--teal);
    }

    .input-wrap {
      position: relative;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      height: var(--input-h);
      padding: 0 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input::placeholder {
      color: #B0B8C9;
    }

    input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(14, 124, 107, 0.1);
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-toggle svg {
      width: 18px;
      height: 18px;
    }

    input[type="password"],
    input.has-toggle {
      padding-right: 44px;
    }

    /* FORGOT LINK */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -0.25rem;
      margin-bottom: 1.25rem;
    }

    .forgot-link {
      font-size: 12.5px;
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .forgot-link:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    /* DIVIDER */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    /* BUTTONS */
    .btn-primary {
      width: 100%;
      height: 52px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      margin-bottom: 0.75rem;
      box-shadow: 0 2px 8px rgba(14, 124, 107, 0.25);
    }

    .btn-primary:hover {
      background: var(--accent);
      box-shadow: 0 4px 14px rgba(14, 124, 107, 0.3);
    }

    .btn-primary:active {
      transform: scale(0.99);
    }

    .btn-primary svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .btn-secondary {
      width: 100%;
      height: 50px;
      background: var(--teal-light);
      color: var(--teal);
      border: 1.5px solid #A8DDD5;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-secondary:hover {
      background: #CCECe7;
      border-color: var(--teal-mid);
    }

    /* MESSAGE */
    #msg {
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      margin-top: 1rem;
      font-weight: 500;
      border-radius: 8px;
      padding: 0;
      transition: all 0.2s;
    }

    #msg.error {
      color: var(--error);
      background: #FEF2F2;
      border: 1px solid #FECACA;
      padding: 10px 14px;
    }

    #msg.success {
      color: var(--success);
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      padding: 10px 14px;
    }

    /* FOOTER */
    .page-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 12px;
      color: var(--muted);
    }

    /* SPIN ANIMATION */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* RESPONSIVE */
    @media (min-width: 600px) {
      .page-wrap {
        max-width: 460px;
      }
    }

    @media (max-width: 400px) {
      .form-body {
        padding: 1.25rem;
      }

      .card-header {
        padding: 1.25rem 1.25rem 1.1rem;
      }
    }
  </style>
</head>
<body>

<div class="page-wrap">

  <!-- ORG BADGE -->
  <div class="org-badge">
    <div class="org-logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L3 7v10l9 5 9-5V7L12 2z" fill="#0E7C6B" opacity="0.15"/>
        <path d="M12 2L3 7v10l9 5 9-5V7L12 2z" stroke="#0E7C6B" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M12 7l-5 2.8v5.4L12 18l5-2.8V9.8L12 7z" fill="#0E7C6B" opacity="0.4"/>
      </svg>
    </div>
    <div>
      <div class="org-name">DBKU Portal</div>
      <div class="org-sub">Attendance Management System</div>
    </div>
  </div>

  <!-- CARD -->
  <div class="card">

    <!-- HEADER -->
    <div class="card-header">
      <div class="form-type-pill">Secure Login</div>
      <div class="card-title">Welcome Back</div>
      <div class="card-subtitle">Sign in to access your dashboard and attendance records</div>
    </div>

    <!-- FORM -->
    <div class="form-body">

      <div class="field-group">
        <label class="field-label" for="username">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          </span>
          Staff ID or Email
        </label>
        <input type="text" id="username" placeholder="e.g. DBKU0001 or example@dbku.gov.my" autocomplete="username">
      </div>

      <div class="field-group">
        <label class="field-label" for="password">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          </span>
          Password
        </label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" class="has-toggle">
          <button class="password-toggle" type="button" onclick="togglePassword('password', this)" aria-label="Show/hide password">
            <svg id="eyeIcon-password" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="forgot-row">
        <a href="/forgot-password/" class="forgot-link">Forgot Password?</a>
      </div>

      <button class="btn-primary" onclick="loginUser()" id="loginBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg>
        Login
      </button>

      <hr class="divider">

      <a href="/register/" class="btn-secondary">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="width:17px;height:17px"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        Create New Account
      </a>

      <p id="msg"></p>

    </div>
  </div>

  <div class="page-footer">DBKU Attendance Management System &copy; 2026 &middot; All rights reserved</div>
</div>

<script>
  function togglePassword(fieldId, btn) {
    const input = document.getElementById(fieldId);
    const icon = document.getElementById('eyeIcon-' + fieldId);
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    icon.innerHTML = isPassword
      ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }

  function setMsg(text, type) {
    const el = document.getElementById('msg');
    el.innerText = text;
    el.className = type || '';
  }

  function loginUser() {
    const btn = document.getElementById('loginBtn');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      setMsg('Please fill in all fields.', 'error');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = `<div class="spinner"></div> Signing in...`;

    fetch('/api/employees/login/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
      if (data.message) {
        setMsg('Login successful. Redirecting...', 'success');
        const params = new URLSearchParams(window.location.search);
        const nextUrl = params.get('next');
        setTimeout(() => {
          window.location.href = nextUrl || '/dashboard/';
        }, 800);
      } else {
        setMsg(data.error || 'Login failed. Please check your credentials.', 'error');
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg> Login`;
      }
    })
    .catch(() => {
      setMsg('Error connecting to server. Please try again.', 'error');
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg> Login`;
    });
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loginUser();
  });
</script>

</body>
</html>
