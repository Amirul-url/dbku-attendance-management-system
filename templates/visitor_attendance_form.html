<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Visitor Attendance</title>
</head>

<body class="bg-gray-100 min-h-screen py-6 px-4">

<div class="max-w-xl mx-auto bg-white p-6 rounded-2xl shadow-lg">

  <!-- HEADER -->
  <h2 class="text-2xl font-bold text-center mb-2">
    Attendance Registration Form (Visitor)
  </h2>

  <p class="text-center text-gray-500 mb-6">
    Please complete the form below to record your attendance
  </p>

  <!-- EVENT INFO -->
  <div class="bg-gray-50 p-4 rounded-lg mb-6 text-sm space-y-1">
    <p><b>Event Name:</b> {{ event.name }}</p>
    <p><b>Date:</b> {{ event.date|date:"d/m/Y" }}</p>
    <p><b>Location:</b> {{ event.location }}</p>
    <p><b>Description:</b> {{ event.description|default:"-" }}</p>
    <p><b>Allowed Radius:</b> {{ event.radius_meter }} meter</p>
  </div>

  <!-- FORM -->
  <div class="space-y-4">
    <div>
      <label class="font-semibold">1. Full Name</label>
      <input id="name" placeholder="e.g. John Doe"
        class="w-full mt-1 p-3 border rounded-lg">
    </div>

    <div>
      <label class="font-semibold">2. Phone Number</label>
      <input id="phone" placeholder="e.g. 0123456789"
        class="w-full mt-1 p-3 border rounded-lg">
    </div>

    <div>
      <label class="font-semibold">3. Email</label>
      <input id="email" placeholder="e.g. john@email.com"
        class="w-full mt-1 p-3 border rounded-lg">
    </div>

    <div>
      <label class="font-semibold">4. Organization Category</label>
      <select id="org" onchange="toggleOtherOrganization()"
        class="w-full mt-1 p-3 border rounded-lg bg-white">
        <option value="">-- Select organization category --</option>
        <option value="Individual / Personal">Individual / Personal</option>
        <option value="Private Company / Corporate">Private Company / Corporate</option>
        <option value="Government Agency / Public Sector">Government Agency / Public Sector</option>
        <option value="Student (School / University)">Student (School / University)</option>
        <option value="NGO / Association">NGO / Association</option>
        <option value="Others">Others</option>
      </select>
    </div>

    <div id="otherOrgWrapper" class="hidden">
      <label class="font-semibold">5. Please Specify</label>
      <input id="other_org" placeholder="e.g. Community Group / Freelance / Other"
        class="w-full mt-1 p-3 border rounded-lg">
    </div>
  </div>

  <!-- BUTTON -->
  <button id="submitBtn" onclick="submitForm()"
    class="mt-6 w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">
    Register
  </button>

</div>

<!-- POPUP -->
<div id="popup" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">
  <div class="bg-white p-6 rounded-xl text-center w-80">
    <p id="popupMsg" class="mb-4 font-semibold"></p>
    <button onclick="closePopup()" class="bg-blue-500 text-white px-4 py-2 rounded">
      OK
    </button>
  </div>
</div>

<script>
function showPopup(msg, type="info") {
  const text = document.getElementById("popupMsg");

  if (type === "success") {
    text.innerHTML = "✅ " + msg;
  } else if (type === "error") {
    text.innerHTML = "❌ " + msg;
  } else {
    text.innerText = msg;
  }

  document.getElementById("popup").classList.remove("hidden");
}

function closePopup() {
  document.getElementById("popup").classList.add("hidden");
}

function toggleOtherOrganization() {
  const org = document.getElementById("org").value;
  const wrapper = document.getElementById("otherOrgWrapper");
  const otherInput = document.getElementById("other_org");

  if (org === "Others") {
    wrapper.classList.remove("hidden");
  } else {
    wrapper.classList.add("hidden");
    otherInput.value = "";
  }
}

function submitForm() {
  const btn = document.getElementById("submitBtn");

  const full_name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const orgCategory = document.getElementById("org").value.trim();
  const otherOrg = document.getElementById("other_org").value.trim();

  let organization = orgCategory;

  if (orgCategory === "Others") {
    organization = otherOrg;
  }

  if (!full_name || !phone || !email || !orgCategory) {
    showPopup("Please fill all fields", "error");
    return;
  }

  if (orgCategory === "Others" && !otherOrg) {
    showPopup("Please specify your organization", "error");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Processing...";

  if (!navigator.geolocation) {
    showPopup("Geolocation not supported", "error");
    btn.disabled = false;
    btn.innerText = "Register";
    return;
  }

  showPopup("Getting your location...");

  navigator.geolocation.getCurrentPosition(position => {

    showPopup("Submitting attendance...");

    fetch('/api/employees/visitor-attendance/submit/{{ event.id }}/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        full_name,
        phone,
        email,
        organization,
        latitude: position.coords.latitude,
        longitude: position.coords.longitude
      })
    })
    .then(res => res.json())
    .then(data => {

      if (data.error) {
        showPopup(data.error, "error");
      } else {
        showPopup(data.message, "success");

        document.getElementById("name").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("email").value = "";
        document.getElementById("org").value = "";
        document.getElementById("other_org").value = "";
        document.getElementById("otherOrgWrapper").classList.add("hidden");
      }

      btn.disabled = false;
      btn.innerText = "Register";

    })
    .catch(() => {
      showPopup("Server error", "error");
      btn.disabled = false;
      btn.innerText = "Register";
    });

  }, (error) => {
    if (error.code === 1) {
      showPopup("Location permission denied. Please allow GPS.", "error");
    } else if (error.code === 2) {
      showPopup("Location unavailable. Please turn ON GPS.", "error");
    } else if (error.code === 3) {
      showPopup("Location request timed out. Try again.", "error");
    } else {
      showPopup("GPS not detected. Please turn ON location and try again.", "error");
    }

    btn.disabled = false;
    btn.innerText = "Register";
  }, {
    enableHighAccuracy: true,
    timeout: 5000,
    maximumAge: 0
  });
}
</script>

</body>
</html>
