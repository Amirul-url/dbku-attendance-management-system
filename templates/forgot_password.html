<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Forgot Password</title>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4 py-8">

<div class="w-full max-w-md bg-white p-6 rounded-xl shadow border border-gray-200">
  <h2 class="text-2xl font-bold mb-2 text-center">Forgot Password</h2>
  <p class="text-sm text-gray-500 text-center mb-6">
    Enter your registered email to receive OTP code
  </p>

  <div class="space-y-3">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Registered Email</label>
      <input id="email" type="email" placeholder="Enter your registered email"
        class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
    </div>

    <button onclick="sendOtp()" type="button"
      class="bg-blue-500 text-white px-4 py-3 rounded w-full hover:bg-blue-600">
      Send OTP
    </button>
  </div>

  <div id="otpSection" class="hidden mt-5 border-t pt-5">
    <label class="block text-sm font-medium text-gray-700 mb-1">OTP Code</label>
    <input id="otp" placeholder="Enter 6-digit OTP"
      class="w-full p-3 border rounded mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400">

    <button onclick="verifyOtp()" type="button"
      class="bg-green-500 text-white px-4 py-3 rounded w-full hover:bg-green-600">
      Verify OTP
    </button>
  </div>

  <a href="/login-page/"
     class="block text-center bg-gray-300 text-gray-800 px-4 py-3 rounded w-full hover:bg-gray-400 mt-4">
    Back to Login
  </a>

  <p id="msg" class="mt-4 text-center text-sm font-medium"></p>
</div>

<script>
function sendOtp() {
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('msg');

  msg.innerText = "";

  fetch('/api/employees/forgot-password/send-otp/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ email })
  })
  .then(res => res.json())
  .then(data => {
    if (data.message) {
      msg.className = "mt-4 text-center text-sm font-medium text-green-600";
      msg.innerText = data.message;
      document.getElementById('otpSection').classList.remove('hidden');
    } else {
      msg.className = "mt-4 text-center text-sm font-medium text-red-600";
      msg.innerText = data.error || "Failed to send OTP";
    }
  })
  .catch(() => {
    msg.className = "mt-4 text-center text-sm font-medium text-red-600";
    msg.innerText = "Error connecting to server";
  });
}

function verifyOtp() {
  const email = document.getElementById('email').value.trim();
  const otp = document.getElementById('otp').value.trim();
  const msg = document.getElementById('msg');

  msg.innerText = "";

  fetch('/api/employees/forgot-password/verify-otp/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ email, otp })
  })
  .then(res => res.json())
  .then(data => {
    if (data.message) {
      msg.className = "mt-4 text-center text-sm font-medium text-green-600";
      msg.innerText = data.message;
      window.location.href = data.redirect_url || "/reset-password/";
    } else {
      msg.className = "mt-4 text-center text-sm font-medium text-red-600";
      msg.innerText = data.error || "OTP verification failed";
    }
  })
  .catch(() => {
    msg.className = "mt-4 text-center text-sm font-medium text-red-600";
    msg.innerText = "Error connecting to server";
  });
}
</script>

</body>
</html>
