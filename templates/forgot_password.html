<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Staff Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --teal: #0E7C6B;
      --teal-light: #E6F5F2;
      --teal-mid: #3DA896;
      --surface: #F7F8FA;
      --card: #FFFFFF;
      --border: #E2E6EE;
      --text: #1A1D26;
      --muted: #6B7280;
      --accent: #075C4E;
      --success: #16A349;
      --error: #DC2626;
      --radius: 14px;
      --input-h: 52px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem 3rem;
      color: var(--text);
    }

    .page-wrap {
      width: 100%;
      max-width: 440px;
    }

    /* ORG BADGE */
    .org-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .org-logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .org-logo svg { width: 26px; height: 26px; }

    .org-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--teal);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .org-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* CARD */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(14, 124, 107, 0.06);
    }

    /* CARD HEADER */
    .card-header {
      background: var(--teal);
      padding: 1.75rem 1.75rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .card-header::after {
      content: '';
      position: absolute;
      right: -30px; top: -30px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      pointer-events: none;
    }

    .card-header::before {
      content: '';
      position: absolute;
      right: 40px; bottom: -50px;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      pointer-events: none;
    }

    .form-type-pill {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.9);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 0.75rem;
      position: relative;
      z-index: 1;
    }

    .card-title {
      font-size: 1.35rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
      position: relative;
      z-index: 1;
    }

    .card-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      margin-top: 6px;
      position: relative;
      z-index: 1;
    }

    /* STEPS INDICATOR */
    .steps {
      display: flex;
      align-items: center;
      gap: 0;
      margin: 1.5rem 1.75rem 0;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex: 1;
      position: relative;
    }

    .step-circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      border: 2px solid var(--border);
      background: #fff;
      color: var(--muted);
      transition: all 0.3s;
      position: relative;
      z-index: 1;
    }

    .step.active .step-circle {
      background: var(--teal);
      border-color: var(--teal);
      color: #fff;
    }

    .step.done .step-circle {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    .step-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }

    .step.active .step-label { color: var(--teal); font-weight: 600; }
    .step.done .step-label { color: var(--success); }

    .step-line {
      flex: 1;
      height: 2px;
      background: var(--border);
      margin-bottom: 18px;
      transition: background 0.3s;
    }

    .step-line.done { background: var(--success); }

    /* FORM BODY */
    .form-body {
      padding: 1.5rem 1.75rem 1.75rem;
    }

    .field-group {
      margin-bottom: 1.1rem;
    }

    .field-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 7px;
      letter-spacing: 0.02em;
    }

    .field-icon {
      width: 22px;
      height: 22px;
      background: var(--teal-light);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .field-icon svg {
      width: 13px;
      height: 13px;
      fill: var(--teal);
    }

    input[type="email"],
    input[type="text"],
    input[type="number"] {
      width: 100%;
      height: var(--input-h);
      padding: 0 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input::placeholder { color: #B0B8C9; }

    input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(14, 124, 107, 0.1);
    }

    /* OTP INPUT */
    .otp-wrap {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .otp-digit {
      width: 48px;
      height: 56px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      max-width: 56px;
    }

    .otp-digit:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(14, 124, 107, 0.1);
    }

    .otp-digit.filled {
      border-color: var(--teal-mid);
      background: var(--teal-light);
    }

    /* OTP HINT */
    .otp-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--teal-light);
      border: 1px solid #A8DDD5;
      border-radius: 10px;
      padding: 0.875rem 1rem;
      margin-bottom: 1.25rem;
    }

    .otp-hint svg {
      width: 16px;
      height: 16px;
      fill: var(--teal);
      flex-shrink: 0;
    }

    .otp-hint span {
      font-size: 12.5px;
      color: var(--accent);
      line-height: 1.4;
    }

    /* RESEND ROW */
    .resend-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .resend-label {
      font-size: 12.5px;
      color: var(--muted);
    }

    .resend-btn {
      font-size: 12.5px;
      color: var(--teal);
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.15s;
    }

    .resend-btn:hover { color: var(--accent); }
    .resend-btn:disabled { color: var(--muted); cursor: default; }

    /* SECTION — hidden by default */
    .step-section {
      display: none;
    }

    .step-section.active {
      display: block;
    }

    /* DIVIDER */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    /* BUTTONS */
    .btn-primary {
      width: 100%;
      height: 52px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      margin-bottom: 0.75rem;
      box-shadow: 0 2px 8px rgba(14, 124, 107, 0.25);
    }

    .btn-primary:hover { background: var(--accent); box-shadow: 0 4px 14px rgba(14, 124, 107, 0.3); }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
    .btn-primary svg { width: 18px; height: 18px; fill: #fff; }

    .btn-secondary {
      width: 100%;
      height: 50px;
      background: var(--teal-light);
      color: var(--teal);
      border: 1.5px solid #A8DDD5;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-secondary:hover { background: #CCECe7; border-color: var(--teal-mid); }

    /* MESSAGE */
    #msg {
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      margin-top: 1rem;
      font-weight: 500;
      border-radius: 8px;
      padding: 0;
      transition: all 0.2s;
    }

    #msg.error {
      color: var(--error);
      background: #FEF2F2;
      border: 1px solid #FECACA;
      padding: 10px 14px;
    }

    #msg.success {
      color: var(--success);
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      padding: 10px 14px;
    }

    /* SPINNER */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* FOOTER */
    .page-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 400px) {
      .form-body { padding: 1.25rem; }
      .card-header { padding: 1.25rem 1.25rem 1.1rem; }
      .steps { margin-left: 1.25rem; margin-right: 1.25rem; }
      .otp-digit { height: 50px; font-size: 20px; }
    }
  </style>
</head>
<body>

<div class="page-wrap">

  <!-- ORG BADGE -->
  <div class="org-badge">
    <div class="org-logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L3 7v10l9 5 9-5V7L12 2z" fill="#0E7C6B" opacity="0.15"/>
        <path d="M12 2L3 7v10l9 5 9-5V7L12 2z" stroke="#0E7C6B" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M12 7l-5 2.8v5.4L12 18l5-2.8V9.8L12 7z" fill="#0E7C6B" opacity="0.4"/>
      </svg>
    </div>
    <div>
      <div class="org-name">Staff Portal</div>
      <div class="org-sub">Attendance & Access Management</div>
    </div>
  </div>

  <!-- CARD -->
  <div class="card">

    <!-- HEADER -->
    <div class="card-header">
      <div class="form-type-pill">Account Recovery</div>
      <div class="card-title">Forgot Password</div>
      <div class="card-subtitle">We'll send a one-time code to your registered email</div>
    </div>

    <!-- STEPS -->
    <div class="steps">
      <div class="step active" id="step1-indicator">
        <div class="step-circle" id="step1-circle">1</div>
        <div class="step-label">Email</div>
      </div>
      <div class="step-line" id="line1"></div>
      <div class="step" id="step2-indicator">
        <div class="step-circle" id="step2-circle">2</div>
        <div class="step-label">Verify OTP</div>
      </div>
    </div>

    <!-- FORM BODY -->
    <div class="form-body">

      <!-- STEP 1: EMAIL -->
      <div class="step-section active" id="section-email">

        <div class="field-group">
          <label class="field-label" for="email">
            <span class="field-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            </span>
            Registered Email
          </label>
          <input type="email" id="email" placeholder="e.g. ali@dbku.gov.my" autocomplete="email">
        </div>

        <button class="btn-primary" id="sendBtn" onclick="sendOtp()" type="button">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          Send OTP Code
        </button>

        <hr class="divider">

        <a href="/login-page/" class="btn-secondary">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="width:17px;height:17px"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Back to Login
        </a>

        <p id="msg"></p>
      </div>

      <!-- STEP 2: OTP -->
      <div class="step-section" id="section-otp">

        <div class="otp-hint">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
          <span>A 6-digit OTP has been sent to <strong id="sentEmailDisplay"></strong>. Check your inbox or spam folder.</span>
        </div>

        <div class="field-group">
          <label class="field-label" style="justify-content: center; margin-bottom: 12px;">
            <span class="field-icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            </span>
            Enter 6-digit OTP
          </label>
          <div class="otp-wrap">
            <input class="otp-digit" type="text" maxlength="1" id="otp0" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
            <input class="otp-digit" type="text" maxlength="1" id="otp1" inputmode="numeric" pattern="[0-9]">
            <input class="otp-digit" type="text" maxlength="1" id="otp2" inputmode="numeric" pattern="[0-9]">
            <input class="otp-digit" type="text" maxlength="1" id="otp3" inputmode="numeric" pattern="[0-9]">
            <input class="otp-digit" type="text" maxlength="1" id="otp4" inputmode="numeric" pattern="[0-9]">
            <input class="otp-digit" type="text" maxlength="1" id="otp5" inputmode="numeric" pattern="[0-9]">
          </div>
        </div>

        <div class="resend-row">
          <span class="resend-label">Didn't receive the code?</span>
          <button class="resend-btn" id="resendBtn" onclick="resendOtp()" type="button">Resend OTP</button>
        </div>

        <button class="btn-primary" id="verifyBtn" onclick="verifyOtp()" type="button">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
          Verify OTP
        </button>

        <button class="btn-secondary" onclick="goBackToEmail()" type="button" style="margin-top: 0.75rem;">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="width:17px;height:17px"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Change Email
        </button>

        <p id="msg2"></p>
      </div>

    </div>
  </div>

  <div class="page-footer">Staff Portal &copy; 2025 &middot; All rights reserved</div>
</div>

<script>
  // OTP box auto-advance
  const otpBoxes = Array.from({length: 6}, (_, i) => document.getElementById('otp' + i));

  otpBoxes.forEach((box, i) => {
    box.addEventListener('input', function(e) {
      const val = e.target.value.replace(/[^0-9]/g, '');
      e.target.value = val;
      e.target.classList.toggle('filled', val.length > 0);
      if (val && i < 5) otpBoxes[i + 1].focus();
    });

    box.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !box.value && i > 0) {
        otpBoxes[i - 1].focus();
        otpBoxes[i - 1].value = '';
        otpBoxes[i - 1].classList.remove('filled');
      }
    });

    box.addEventListener('paste', function(e) {
      e.preventDefault();
      const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
      paste.split('').slice(0, 6).forEach((ch, j) => {
        if (otpBoxes[j]) {
          otpBoxes[j].value = ch;
          otpBoxes[j].classList.add('filled');
        }
      });
      const last = Math.min(paste.length, 5);
      otpBoxes[last].focus();
    });
  });

  function getOtpValue() {
    return otpBoxes.map(b => b.value).join('');
  }

  function setMsg(id, text, type) {
    const el = document.getElementById(id);
    el.innerText = text;
    el.className = type || '';
    if (text) el.style.marginTop = '1rem';
  }

  function goBackToEmail() {
    document.getElementById('section-otp').classList.remove('active');
    document.getElementById('section-email').classList.add('active');
    document.getElementById('step1-indicator').className = 'step active';
    document.getElementById('step2-indicator').className = 'step';
    document.getElementById('line1').className = 'step-line';
    setMsg('msg', '', '');
    setMsg('msg2', '', '');
    otpBoxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
  }

  function sendOtp() {
    const email = document.getElementById('email').value.trim();
    if (!email) { setMsg('msg', 'Please enter your email address.', 'error'); return; }
    if (!email.includes('@')) { setMsg('msg', 'Please enter a valid email address.', 'error'); return; }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = `<div class="spinner"></div> Sending...`;

    fetch('/api/employees/forgot-password/send-otp/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    })
    .then(res => res.json())
    .then(data => {
      if (data.message) {
        document.getElementById('sentEmailDisplay').innerText = email;
        document.getElementById('section-email').classList.remove('active');
        document.getElementById('section-otp').classList.add('active');
        document.getElementById('step1-indicator').className = 'step done';
        document.getElementById('step1-circle').innerHTML = `<svg viewBox="0 0 24 24" fill="white" width="14" height="14"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>`;
        document.getElementById('step2-indicator').className = 'step active';
        document.getElementById('line1').className = 'step-line done';
        setTimeout(() => otpBoxes[0].focus(), 100);
        startResendTimer();
      } else {
        setMsg('msg', data.error || 'Failed to send OTP.', 'error');
      }
    })
    .catch(() => setMsg('msg', 'Error connecting to server.', 'error'))
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg> Send OTP Code`;
    });
  }

  let resendTimer = null;

  function startResendTimer() {
    const btn = document.getElementById('resendBtn');
    let seconds = 60;
    btn.disabled = true;
    btn.innerText = `Resend in ${seconds}s`;
    if (resendTimer) clearInterval(resendTimer);
    resendTimer = setInterval(() => {
      seconds--;
      btn.innerText = seconds > 0 ? `Resend in ${seconds}s` : 'Resend OTP';
      if (seconds <= 0) {
        clearInterval(resendTimer);
        btn.disabled = false;
      }
    }, 1000);
  }

  function resendOtp() {
    const email = document.getElementById('email').value.trim();
    setMsg('msg2', '', '');
    fetch('/api/employees/forgot-password/send-otp/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    })
    .then(res => res.json())
    .then(data => {
      if (data.message) {
        setMsg('msg2', 'OTP resent successfully.', 'success');
        otpBoxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
        otpBoxes[0].focus();
        startResendTimer();
      } else {
        setMsg('msg2', data.error || 'Failed to resend OTP.', 'error');
      }
    })
    .catch(() => setMsg('msg2', 'Error connecting to server.', 'error'));
  }

  function verifyOtp() {
    const email = document.getElementById('email').value.trim();
    const otp = getOtpValue();

    if (otp.length < 6) { setMsg('msg2', 'Please enter the complete 6-digit OTP.', 'error'); return; }

    const btn = document.getElementById('verifyBtn');
    btn.disabled = true;
    btn.innerHTML = `<div class="spinner"></div> Verifying...`;

    fetch('/api/employees/forgot-password/verify-otp/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, otp })
    })
    .then(res => res.json())
    .then(data => {
      if (data.message) {
        setMsg('msg2', 'OTP verified! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = data.redirect_url || '/reset-password/';
        }, 800);
      } else {
        setMsg('msg2', data.error || 'OTP verification failed.', 'error');
        otpBoxes.forEach(b => { b.style.borderColor = 'var(--error)'; });
        setTimeout(() => otpBoxes.forEach(b => { b.style.borderColor = ''; }), 1500);
      }
    })
    .catch(() => setMsg('msg2', 'Error connecting to server.', 'error'))
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg> Verify OTP`;
    });
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (document.getElementById('section-email').classList.contains('active')) sendOtp();
      else verifyOtp();
    }
  });
</script>

</body>
</html>
