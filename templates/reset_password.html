<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Reset Password</title>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4 py-8">

<div class="w-full max-w-md bg-white p-6 rounded-xl shadow border border-gray-200">
  <h2 class="text-2xl font-bold mb-2 text-center">Reset Password</h2>
  <p class="text-sm text-gray-500 text-center mb-6">
    Create your new password
  </p>

  <div class="space-y-3">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
      <input id="new_password" type="password" placeholder="Enter new password"
        class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
      <input id="confirm_password" type="password" placeholder="Confirm new password"
        class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
    </div>

    <button onclick="submitResetPassword()" type="button"
      class="bg-green-500 text-white px-4 py-3 rounded w-full hover:bg-green-600">
      Save New Password
    </button>
  </div>

  <p id="msg" class="mt-4 text-center text-sm font-medium"></p>
</div>

<div id="successModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center px-4 z-50">
  <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm text-center">
    <div class="w-14 h-14 mx-auto rounded-full bg-green-100 flex items-center justify-center text-green-600 text-2xl mb-3">
      ✓
    </div>
    <h3 class="text-lg font-bold text-gray-800">Password Reset Successful</h3>
    <p class="text-sm text-gray-500 mt-2">
      Redirecting to login page in <span id="countdown">3</span>s...
    </p>
  </div>
</div>

<script>
function submitResetPassword() {
  const newPassword = document.getElementById('new_password').value;
  const confirmPassword = document.getElementById('confirm_password').value;
  const msg = document.getElementById('msg');

  msg.innerText = "";

  fetch('/api/employees/reset-password/submit/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      new_password: newPassword,
      confirm_password: confirmPassword
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.message) {
      showSuccessAndRedirect(data.redirect_url || '/login-page/');
    } else {
      msg.className = "mt-4 text-center text-sm font-medium text-red-600";
      msg.innerText = data.error || "Failed to reset password";
    }
  })
  .catch(() => {
    msg.className = "mt-4 text-center text-sm font-medium text-red-600";
    msg.innerText = "Error connecting to server";
  });
}

function showSuccessAndRedirect(url) {
  const modal = document.getElementById('successModal');
  const countdownEl = document.getElementById('countdown');

  modal.classList.remove('hidden');

  let seconds = 3;
  countdownEl.innerText = seconds;

  const timer = setInterval(() => {
    seconds -= 1;
    countdownEl.innerText = seconds;

    if (seconds <= 0) {
      clearInterval(timer);
      window.location.href = url;
    }
  }, 1000);
}
</script>

</body>
</html>
