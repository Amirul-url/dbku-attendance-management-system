<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>DBKU Attendance</title>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <div class="w-64 bg-white shadow-xl p-5 flex flex-col justify-between">
    <div>
      <h2 class="text-xl font-bold text-blue-600 mb-8">ADMIN PANEL</h2>

      <ul class="space-y-3">
        <li>
          <a href="/dashboard/"
             class="block p-2 rounded hover:bg-gray-100 {% if request.path == '/dashboard/' %}bg-blue-100 text-blue-600{% else %}text-gray-600{% endif %}">
            Dashboard
          </a>
        </li>

        <li>
          <a href="/employees/"
             class="block p-2 rounded hover:bg-gray-100 {% if request.path == '/employees/' %}bg-blue-100 text-blue-600{% else %}text-gray-600{% endif %}">
            Employees
          </a>
        </li>

        <li>
          <a href="/events/"
             class="block p-2 rounded hover:bg-gray-100 {% if request.path == '/events/' or '/events/' in request.path %}bg-blue-100 text-blue-600{% else %}text-gray-600{% endif %}">
            Events
          </a>
        </li>

        <li>
          <a href="/analytics/"
             class="block p-2 rounded hover:bg-gray-100 {% if request.path == '/analytics/' %}bg-blue-100 text-blue-600{% else %}text-gray-600{% endif %}">
            Analytics
          </a>
        </li>
      </ul>
    </div>

    <form method="POST" action="/logout/">
      {% csrf_token %}
      <button class="bg-red-500 text-white w-full py-2 rounded hover:bg-red-600">
        Logout
      </button>
    </form>
  </div>

  <!-- MAIN -->
  <div class="flex-1 p-6 overflow-y-auto">

    <!-- TOP BAR -->
    <div class="flex justify-between items-center mb-6">
      <div class="text-sm text-gray-500">
        DBKU Attendance Management System
      </div>

      <div class="relative">
        <button onclick="toggleDropdown()" class="flex items-center gap-2 bg-white px-4 py-2 rounded shadow">
          👤
          <span>
            {{ current_employee.full_name|default:request.user.username }}
            {% if current_employee %}
              - {{ current_employee.role|title }}
            {% endif %}
          </span>
        </button>

        <div id="dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white shadow rounded z-50">
          <div class="px-4 py-2 text-sm text-gray-500 border-b">
            {{ request.user.username }}
          </div>
          <a href="/logout/" class="block px-4 py-2 text-red-500 hover:bg-gray-100">Logout</a>
        </div>
      </div>
    </div>

    {% block content %}
    {% endblock %}

  </div>

</div>

<script>
function toggleDropdown() {
  document.getElementById("dropdown").classList.toggle("hidden");
}
</script>

</body>
</html>
