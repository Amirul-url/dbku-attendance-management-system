<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <title>DBKU Attendance</title>
</head>

<body class="bg-gray-100">

<div class="flex h-screen flex-col md:flex-row">

  <!-- SIDEBAR -->
  <div id="sidebar"
     class="w-full md:w-64 bg-white shadow-xl p-5 flex flex-col justify-between hidden md:flex">
    <div>
      <h2 class="text-xl font-bold text-blue-600 mb-8">ADMIN PANEL</h2>

      <ul class="space-y-3">
        <li>
          <a href="/dashboard/"
            class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 {% if request.path == '/dashboard/' %}bg-blue-100 text-blue-600{% else %}text-gray-600{% endif %}">
            <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
            <span>Dashboard</span>
          </a>
        </li>

        <li>
          <a href="/employees/"
            class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 {% if request.path == '/employees/' %}bg-blue-100 text-blue-600{% else %}text-gray-600{% endif %}">
            <i data-lucide="users" class="w-5 h-5"></i>
            <span>Staff</span>
          </a>
        </li>

        <li>
          <a href="/events/"
            class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 {% if request.path == '/events/' or '/events/' in request.path %}bg-blue-100 text-blue-600{% else %}text-gray-600{% endif %}">
            <i data-lucide="calendar-days" class="w-5 h-5"></i>
            <span>Events</span>
          </a>
        </li>

        <li>
          <a href="/analytics/"
            class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 {% if request.path == '/analytics/' %}bg-blue-100 text-blue-600{% else %}text-gray-600{% endif %}">
            <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
            <span>Analytics</span>
          </a>
        </li>
      </ul>
    </div>

    <form method="POST" action="/logout/">
      {% csrf_token %}
      <button class="inline-flex items-center justify-center gap-2 bg-red-500 text-white w-full py-3 rounded-xl hover:bg-red-600 transition font-medium">
        <i data-lucide="log-out" class="w-5 h-5"></i>
        <span>Logout</span>
      </button>
    </form>
  </div>

  <!-- MAIN -->
  <div class="flex-1 p-4 md:p-6 overflow-y-auto">

    <!-- TOP BAR -->
  <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-3 mb-6">
    <div class="flex items-center justify-between gap-3">
      <button onclick="toggleSidebar()" class="md:hidden bg-white px-3 py-2 rounded shadow">
        ☰
      </button>

      <div class="text-sm text-gray-500">
        DBKU Attendance Management System
      </div>
    </div>

    <div class="relative">
      <button onclick="toggleDropdown()" class="flex items-center gap-2 bg-white px-4 py-2 rounded shadow w-full md:w-auto">
        👤
        <span>
          {{ current_employee.full_name|default:request.user.username }}
          {% if current_employee %}
            - {{ current_employee.role|title }}
          {% endif %}
        </span>
      </button>

      <div id="dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white shadow rounded z-50">
        <div class="px-4 py-2 text-sm text-gray-500 border-b">
          {{ request.user.username }}
        </div>
        <a href="/logout/" class="block px-4 py-2 text-red-500 hover:bg-gray-100">Logout</a>
      </div>
    </div>
  </div>

    {% block content %}
    {% endblock %}

  </div>

</div>

<script>
function toggleDropdown() {
  document.getElementById("dropdown").classList.toggle("hidden");
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("hidden");
}

document.addEventListener("click", function (e) {
  const dropdown = document.getElementById("dropdown");
  if (!e.target.closest(".relative")) {
    dropdown.classList.add("hidden");
  }
});

document.addEventListener("DOMContentLoaded", function () {
  lucide.createIcons();
});
</script>

</body>
</html>
