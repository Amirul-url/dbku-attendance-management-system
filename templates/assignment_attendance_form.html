{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ocean: #003B46;
      --ocean-light: #004f60;
      --teal: #0E7C6B;
      --surface: #F4F6F7;
      --card: #FFFFFF;
      --border: #DDE8EA;
      --text: #1A2E35;
      --muted: #6B8A93;
      --success: #16A34A;
      --error: #DC2626;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px 16px 48px;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
    }

    .page-wrap {
      max-width: 640px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.04);
    }

    .card-header {
      background: linear-gradient(135deg, var(--ocean), var(--teal));
      color: #fff;
      padding: 24px;
    }

    .pill {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 24px;
      font-weight: 700;
      margin: 0;
    }

    .card-subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
    }

    .card-body {
      padding: 22px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 22px;
    }

    .info-box {
      background: #F8FBFC;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .info-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .info-value {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 600;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: #fff;
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--ocean);
    }

    .form-input[readonly] {
      background: #F4F7F8;
      color: #4b5563;
    }

    .form-textarea {
      min-height: 110px;
      resize: vertical;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      background: var(--ocean);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .btn:hover {
      background: var(--ocean-light);
    }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
      white-space: pre-line;
    }

    .message.success {
      display: block;
      background: #DCFCE7;
      color: #166534;
      border: 1px solid #BBF7D0;
    }

    .message.error {
      display: block;
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FECACA;
    }

    @media (max-width: 640px) {
      .info-grid {
        grid-template-columns: 1fr;
      }

      .card-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="card">
      <div class="card-header">
        <div class="pill">Assigned Staff Attendance</div>
        <h1 class="card-title">{{ event.name }}</h1>
        <div class="card-subtitle">
          Please confirm your assignment attendance for this event.
        </div>
      </div>

      <div class="card-body">
        <div class="info-grid">
          <div class="info-box">
            <div class="info-label">Assigned Staff</div>
            <div class="info-value">{{ employee.full_name }}</div>
          </div>

          <div class="info-box">
            <div class="info-label">Staff ID</div>
            <div class="info-value">{{ employee.employee_id }}</div>
          </div>

          <div class="info-box">
            <div class="info-label">Task</div>
            <div class="info-value">{{ assignment.task_title }}</div>
          </div>

          <div class="info-box">
            <div class="info-label">Event Location</div>
            <div class="info-value">{{ event.location }}</div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input id="full_name" class="form-input" value="{{ employee.full_name }}" readonly>
        </div>

        <div class="form-group">
          <label class="form-label">Employee ID</label>
          <input id="employee_id" class="form-input" value="{{ employee.employee_id }}" readonly>
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="email" class="form-input" type="email" value="{{ employee.email }}" readonly>
        </div>

        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input id="phone_number" class="form-input" placeholder="Enter your phone number">
        </div>

        <div class="form-group">
          <label class="form-label">Notes (Optional)</label>
          <textarea id="notes" class="form-textarea" placeholder="Example: PA system ready, registration desk opened, etc."></textarea>
        </div>

        <button id="submitBtn" class="btn" type="button" onclick="submitAssignmentAttendance()">
          Submit Attendance
        </button>

        <div id="messageBox" class="message"></div>
      </div>
    </div>
  </div>

  <script>
    let detectedIPv4 = "";

    async function detectIPv4() {
      try {
        const res = await fetch("https://api.ipify.org?format=json");
        const data = await res.json();
        detectedIPv4 = data.ip || "";
      } catch (err) {
        detectedIPv4 = "";
      }
    }

    function showMessage(text, type) {
      const box = document.getElementById("messageBox");
      box.className = "message " + type;
      box.textContent = text;
    }

    function clearMessage() {
      const box = document.getElementById("messageBox");
      box.className = "message";
      box.textContent = "";
    }

    function setButtonLoading(isLoading) {
      const btn = document.getElementById("submitBtn");
      btn.disabled = isLoading;
      btn.textContent = isLoading ? "Processing..." : "Submit Attendance";
    }

    function submitAssignmentAttendance() {
      clearMessage();

      const full_name = document.getElementById("full_name").value.trim();
      const employee_id = document.getElementById("employee_id").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone_number = document.getElementById("phone_number").value.trim();
      const notes = document.getElementById("notes").value.trim();

      if (!phone_number) {
        showMessage("Phone number is required.", "error");
        return;
      }

      if (!navigator.geolocation) {
        showMessage("Please enable GPS/location and try again.", "error");
        return;
      }

      setButtonLoading(true);

      navigator.geolocation.getCurrentPosition(
        function (position) {
          fetch("/api/employees/assignment-attendance/submit/{{ assignment.id }}/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              full_name: full_name,
              employee_id: employee_id,
              email: email,
              phone_number: phone_number,
              notes: notes,
              latitude: position.coords.latitude,
              longitude: position.coords.longitude,
              ipv4_address: detectedIPv4
            })
          })
          .then(res => res.json())
          .then(data => {
            if (data.error) {
              showMessage(data.error, "error");
            } else {
              showMessage(
                data.message + "\n\nTask: " + data.task_title + "\nDistance: " + data.distance_meter + " m",
                "success"
              );
              document.getElementById("notes").value = "";
            }
            setButtonLoading(false);
          })
          .catch(() => {
            showMessage("Server error. Please try again.", "error");
            setButtonLoading(false);
          });
        },
        function () {
          showMessage("Please enable GPS/location and try again.", "error");
          setButtonLoading(false);
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    detectIPv4();
  </script>
</body>
</html>
